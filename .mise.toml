[tools]
java = "temurin-25"

[tools."github:detekt/detekt"]
version = "2.0.0-alpha.3"
prerelease = true
asset_pattern = "detekt-cli-2.0.0-alpha.3.zip"
bin_path = "detekt-cli-2.0.0-alpha.3/bin"
rename_exe = "detekt"

[tasks.bootstrap]
description = "Install local development tools"
run = "scripts/bootstrap-dev.sh"

[tasks.test]
description = "Run the Gradle test suite through the wrapper"
run = "./gradlew test"

[tasks."lint:ktlint"]
description = "Run ktlint on changed Kotlin files"
run = "scripts/ktlint-check-changed.sh"

[tasks."format:ktlint"]
description = "Format changed Kotlin files with ktlint"
run = "scripts/ktlint-format-changed.sh"

[tasks."lint:detekt"]
description = "Run detekt CLI against Kotlin source sets"
run = "scripts/detekt.sh"

[tasks.lint]
description = "Run local Kotlin quality checks"
depends = ["lint:ktlint", "lint:detekt"]

[tasks."new-starter"]
description = "Create a new autoconfigure/starter module pair"
run = "scripts/new-starter.sh"

[tasks."docs:facts"]
description = "Generate factual project documentation for AI-assisted docs updates"
run = "scripts/docs-facts.sh"

[tasks."docs:facts:check"]
description = "Check generated project documentation facts"
run = "scripts/docs-facts.sh --check"

[tasks."docs:coverage"]
description = "Check starter and test-support module references in docs"
run = "scripts/docs-coverage-check.sh"

[tasks."docs:check"]
description = "Run documentation consistency checks"
depends = ["docs:facts:check", "docs:coverage"]
